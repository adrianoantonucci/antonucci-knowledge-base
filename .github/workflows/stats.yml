name: Generate Stats

on:
  push:
    branches:
      - main

jobs:
  stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python scripts/generate-stats.py

      - name: Commit Stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: atualiza estatísticas"